# Tool versions for local infrastructure work.
[tools]
terraform = "1.15.6"
awscli = "2.35.9"
checkov = "3.2.517"
infracost = "0.10.44"

[tasks.check]
description = "Check Terraform formatting and configuration"
run = """
terraform fmt -check -recursive
terraform validate
"""

[tasks.plan]
description = "Create the Terraform plan and its JSON representation"
run = """
terraform plan -out tfplan.binary
terraform show -json tfplan.binary > tfplan.json
"""

[tasks.scan]
description = "Scan the Terraform plan with the workshop Checkov policies"
run = "checkov -f tfplan.json --config-file .checkov.yml"

[tasks.cost]
description = "Show hourly and monthly infrastructure costs"
run = "infracost breakdown --config-file infracost.yml --fields hourlyCost,monthlyCost"
